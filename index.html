<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e0036, #001236, #12001e);
            color: #ffffff;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            background: linear-gradient(45deg, #ff007f, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3.5rem;
            margin-bottom: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.5));
        }
        p {
            color: #00ffcc;
            font-size: 1.3rem;
            margin-bottom: 40px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
        }
        .grid-container {
            display: flex;
            gap: 25px;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .game-card {
            text-decoration: none;
            color: #ffffff;
            font-weight: bold;
            font-size: 1.4rem;
            padding: 30px 50px;
            border-radius: 16px;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 200px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            overflow: hidden;
        }
        /* Card specific neon gradients */
        .card-baldi {
            background: linear-gradient(135deg, #00b894, #00decb);
            border: 2px solid #00ffcc;
        }
        .card-granny {
            background: linear-gradient(135deg, #d63031, #ff7675);
            border: 2px solid #ff4d4d;
        }
        /* Glow effects on hover */
        .card-baldi:hover {
            transform: scale(1.08);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.8);
        }
        .card-granny:hover {
            transform: scale(1.08);
            box-shadow: 0 0 30px rgba(255, 77, 77, 0.8);
        }
        /* Overlay shine effect */
        .game-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 100%);
            transform: skewX(-25deg);
            transition: 0.75s;
        }
        .game-card:hover::before {
            left: 125%;
        }
    </style>
</head>
<body>

    <h1>Game Hub</h1>
    <p>Select a game to start playing instantly!</p>

    <div class="grid-container">
        <a href="baldi.html" class="game-card card-baldi">Play Baldi's Basics</a>
        <a href="granny.html" class="game-card card-granny">Play Granny</a>
    </div>

</body>
</html>
