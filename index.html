<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        h1 {
            color: #ff4757;
            font-size: 3rem;
            margin-bottom: 10px;
        }
        p {
            color: #a4b0be;
            font-size: 1.2rem;
            margin-bottom: 40px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .game-card {
            background-color: #1e1e1e;
            border: 2px solid #2f3542;
            border-radius: 12px;
            padding: 25px;
            text-decoration: none;
            color: #ffffff;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .game-card:hover {
            background-color: #ff4757;
            border-color: #ff6b81;
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(255, 71, 87, 0.4);
        }
    </style>
</head>
<body>

    <h1>Game Hub</h1>
    <p>Select a game to start playing instantly!</p>

    <div class="grid-container">
        <a href="baldi.html" class="game-card">Play Baldi's Basics</a>
        <a href="granny.html" class="game-card">Play Granny</a>
    </div>

</body>
</html>
