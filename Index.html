<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        h1 {
            color: #00adb5;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            color: #888;
            margin-bottom: 40px;
        }
        .arcade-container {
            max-width: 600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 10px;
        }
        .game-card {
            background: #1e1e1e;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 25px;
            transition: transform 0.2s, border-color 0.2s;
        }
        .game-card:hover {
            transform: translateY(-5px);
            border-color: #00adb5;
        }
        .game-title {
            font-size: 1.4rem;
            margin-top: 0;
            color: #ffffff;
        }
        .play-btn {
            display: inline-block;
            background-color: #00adb5;
            color: #eee;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 15px;
            transition: background 0.2s;
        }
        .play-btn:hover {
            background-color: #008087;
        }
    </style>
</head>
<body>

    <h1>My Game Hub</h1>
    <p>Select a game to start playing.</p>
    
    <div class="arcade-container">
        
        <div class="game-card">
            <h2 class="game-title">Granny</h2>
            <a href="granny.html" class="play-btn">Play Granny</a>
        </div>

        <div class="game-card">
            <h2 class="game-title">Baldi's Basics</h2>
            <a href="baldi.html" class="play-btn">Play Baldi's Basics</a>
        </div>

    </div>

</body>
</html>
